<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login & Sign In</title>
<link rel="stylesheet" href="sing_up.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-container">
             <a href="index.html" class="home" style="text-decoration: none;"> <----</a>
            </div>
        </div>
    </nav>
<div class="container">

    <div class="left-panel">
        
        <div class="image-side">
            <div class="art-container">
        <img src="images/12.jpg">
            </div>
        </div>
        <h2 id="form-title">LOGIN</h2>
        <p id="switch-text">Don't have account?</p>
        <button onclick="toggleForm()" class="switch-btn" id="switch-btn">SIGN IN</button>
    </div>

    <div class="right-panel">

        <!-- LOGIN FORM -->
        <div class="form-box" id="login-form">
            <form id="loginForm" onsubmit="return false;">
                <div class="icon"><i class="fa fa-user"></i></div>
                <h2>LOGIN</h2>

                <div class="input-box">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email" autocomplete="username">
                </div>

                <div class="input-box">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
                </div>

                <p id="login-error" class="error-message"></p>

                <button type="button" id="google-login">
                    <img src="images/google.png" alt="Google Logo"> Continue with Google
                </button>

                <button type="submit" class="main-btn" id="btn-login">LOGIN</button>
            </form>
        </div>

        <!-- SIGN UP FORM -->
        <div class="form-box hidden" id="signup-form">
            <form id="signupForm" onsubmit="return false;">
                <div class="icon"><i class="fa fa-user-plus"></i></div>
                <h2>SIGN UP</h2>

                <div class="input-box">
                    <i class="fa fa-user"></i>
                    <input type="text" id="signup-name" placeholder="Full Name" autocomplete="name">
                </div>

                <div class="input-box">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="signup-email" placeholder="Email" autocomplete="username">
                </div>

                <div class="input-box">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="signup-password" placeholder="Password" autocomplete="new-password">
                </div>

                <div class="input-box">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="signup-confirm-password" placeholder="Confirm Password" autocomplete="new-password">
                </div>

                <p id="signup-error" class="error-message"></p>

                <button type="submit" class="main-btn" id="btn-signup">CREATE ACCOUNT</button>
            </form>
        </div>

    </div>

</div>

<script src="sing_up.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
