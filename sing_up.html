<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | ApexTech</title>
    <link rel="stylesheet" href="sing_up.css">
</head>
<body>

    <div class="signup-card">
        <div class="form-side">
            <h2 class="form-title">Sign Up</h2>
            
            <div class="input-group user-icon">
                <input type="text" placeholder="User name" autocomplete="off">
            </div>

            <div class="input-group email-icon">
                <input type="email" placeholder="Email" autocomplete="off">
            </div>

            <div class="input-group lock-icon">
                <input type="password" placeholder="Password">
            </div>

            <button class="submit-btn">Sign Up</button>
            
            <a href="#" class="footer-link">Already Have Account?</a>
        </div>

        <div class="image-side">
            <div class="art-container">
                <img src="images/logo.png" alt="Illustration Image">
            </div>
        </div>
    </div>
</body>
</html>
